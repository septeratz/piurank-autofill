<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PIURank Autofill</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>PIURank Autofill</h1>
      <p class="help">
        1) piugame.com 최근기록 탭에서 <b>현재 piugame 탭에서 가져오기</b><br />
        2) 필요 시 JSON 직접 편집/변환 후 저장<br />
        3) piurank.com/playinfo/write에서 자동 입력
      </p>
      <textarea id="recordsInput" placeholder='[{"songTitle":"...","chartType":"Single","level":17,"score":999999,"perfect":1200}]'></textarea>
      <div class="actions">
        <button id="importFromTabBtn" type="button">현재 piugame 탭에서 가져오기</button>
        <button id="transformBtn" type="button">piugame JSON 변환</button>
        <button id="saveBtn">저장</button>
        <button id="loadSampleBtn" type="button">샘플 넣기</button>
      </div>
      <p id="status"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
